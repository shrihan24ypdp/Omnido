<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarvKarta - Travel Guide</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <style>
        @import url('https://googleapis.com');

        :root {
            --bg-color: darkturquoise;
            --header-bg: green;
            --text-color: white;
            --logo-fill: #222;
            --border-color: #000;
            --card-bg: rgba(255, 255, 255, 0.2);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --header-bg: #062a06;
            --text-color: #e0e0e0;
            --logo-fill: #ffffff;
            --border-color: #444;
            --card-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            font-family: 'Amita', cursive;
            transition: background-color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            border: solid 2px var(--border-color);
            border-radius: 8px;
            background-color: var(--header-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: 0.4s;
        }

        #home-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 2rem;
            padding: 0 15px;
            transition: transform 0.2s;
        }
        #home-link:hover { transform: scale(1.2); }

        .peep-heading { display: flex; align-items: center; margin: 0; cursor: pointer; }
        .logo-text { fill: var(--logo-fill); transition: fill 0.4s; }

        /* Character Animations */
        .peep-heading:hover .character-head { transform: translateY(-5px); }
        .character-head { transition: transform 0.3s; transform-origin: center; }
        
        @keyframes eyeBlink { 
            0%, 90%, 100% { transform: scaleY(1); } 
            95% { transform: scaleY(0.1); } 
        }
        .eye-l { animation: eyeBlink 4s infinite; transform-origin: 55px 42px; }
        .eye-r { animation: eyeBlink 4s infinite; transform-origin: 75px 42px; }

        .content-area {
            max-width: 800px;
            text-align: center;
            color: var(--text-color);
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--border-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            background: var(--header-bg); border: 2px solid var(--border-color);
            width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .theme-toggle .moon { display: none; color: white; }
        .theme-toggle .sun { color: gold; }
        [data-theme="dark"] .theme-toggle .sun { display: none; }
        [data-theme="dark"] .theme-toggle .moon { display: block; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode">
        <svg class="sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>
        <svg class="moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <header>
        <a id="home-link" href="index.html" title="Go Home">𖠿</a>
        <div class="peep-heading">
            <svg viewBox="0 0 350 100" xmlns="http://w3.org" style="height: 60px; width: auto;">
                <text x="90" y="70" class="logo-text" font-family="Amita" font-size="50" font-weight="700">SarvKarta</text>
                <g transform="translate(5, 5) scale(0.7)">
                    <path d="M40 70c-15 0-20 10-20 25v45h90V95c0-15-5-25-20-25H40z" fill="#f9f9f9" stroke="black" stroke-width="3"/>
                    <g class="character-head">
                        <circle cx="65" cy="45" r="24" fill="#ffdbac" stroke="black" stroke-width="3"/>
                        <circle cx="65" cy="32" r="2.5" fill="red" />
                        <circle class="eye-l" cx="55" cy="42" r="2.5" fill="black" />
                        <circle class="eye-r" cx="75" cy="42" r="2.5" fill="black" />
                        <path d="M41 45 q0-20 24-20 t24 20" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
                    </g>
                </g>
            </svg>
        </div>
        <div style="width: 50px;"></div>
    </header>

    <main class="content-area">
        <h1>Travel Guide</h1>
        <p>Do you want to travel? Look for where to go!</p>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
        <p>Coming soon: Interactive maps, destination reviews, and flight tracking.</p>
    </main>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                html.removeAttribute('data-theme');
            } else {
                html.setAttribute('data-theme', 'dark');
            }
        }
    </script>
</body>
</html>
