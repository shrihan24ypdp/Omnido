<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarvKarta - Ultimate Hub</title>
    <style>
        :root {
            --bg: #202124;
            --card: #303134;
            --text: #e8eaed;
            --accent: #8ab4f8;
            --google-gray: #3c4043;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Roboto', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Top Bar Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--google-gray);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-right { text-align: right; }

        /* Tools & Grid */
        main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .tool-card {
            background: var(--card);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--google-gray);
        }

        /* Calculator Styles (Google-Style) */
        #calc-display {
            width: 100%;
            height: 60px;
            background: none;
            border: 1px solid var(--google-gray);
            color: white;
            text-align: right;
            font-size: 24px;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 4px;
            background: var(--google-gray);
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover { background: #4a4e52; }
        .btn-op { background: #dadce0; color: #202124; }
        .btn-blue { background: var(--accent); color: #202124; }

        /* Alarm/Routine */
        .alarm-input {
            width: 70%;
            padding: 8px;
            background: #202124;
            border: 1px solid var(--accent);
            color: white;
        }

        /* Hidden States */
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <strong style="color: var(--accent)">SarvKarta 🛡️</strong>
        <div id="alarm-section">
            <input type="text" id="taskInput" class="alarm-input" placeholder="Enter task...">
            <input type="time" id="alarmTime">
            <button onclick="setAlarm()" class="btn-blue">Set Routine</button>
        </div>
    </div>
    <div class="header-right">
        <div id="weather-top">Scanning Weather...</div>
        <div id="clock" style="font-size: 1.2rem; font-weight: bold;">00:00:00</div>
        <div id="city-display" style="font-size: 0.8rem; opacity: 0.7;">Detecting Location...</div>
    </div>
</header>

<main>
    <!-- Weather Tool -->
    <section class="tool-card">
        <h3>🌦️ Weather Search</h3>
        <input type="text" id="citySearch" placeholder="Enter city name..." class="alarm-input">
        <button onclick="fetchWeather()">Search</button>
        <div id="weatherResult" style="margin-top:15px"></div>
    </section>

    <!-- Calculator Tool -->
    <section class="tool-card">
        <h3>🔢 Calculator</h3>
        <input type="text" id="calc-display" readonly value="0">
        <div class="calc-grid">
            <button onclick="clearCalc()">AC</button>
            <button onclick="calcOp('(')">(</button>
            <button onclick="calcOp(')')">)</button>
            <button onclick="calcOp('/')" class="btn-op">÷</button>
            <button onclick="calcNum('7')">7</button>
            <button onclick="calcNum('8')">8</button>
            <button onclick="calcNum('9')">9</button>
            <button onclick="calcOp('*')" class="btn-op">×</button>
            <button onclick="calcNum('4')">4</button>
            <button onclick="calcNum('5')">5</button>
            <button onclick="calcNum('6')">6</button>
            <button onclick="calcOp('-')" class="btn-op">−</button>
            <button onclick="calcNum('1')">1</button>
            <button onclick="calcNum('2')">2</button>
            <button onclick="calcNum('3')">3</button>
            <button onclick="calcOp('+')" class="btn-op">+</button>
            <button onclick="calcNum('0')">0</button>
            <button onclick="calcNum('.')">.</button>
            <button onclick="calculate()" class="btn-blue" style="grid-column: span 2">=</button>
        </div>
    </section>

    <!-- Games Hub -->
    <section class="tool-card">
        <h3>🎮 Games Hub</h3>
        <div class="calc-grid">
            <button onclick="alert('Launching Chess...')">Chess</button>
            <button onclick="alert('Launching Ludo...')">Ludo</button>
            <button onclick="alert('Launching Snakes...')">Snakes</button>
            <button onclick="alert('Launching Carrom...')">Carrom</button>
            <button onclick="alert('Launching TicTacToe...')">Tic Tac Toe</button>
            <button onclick="alert('Launching RPS...')">RPS</button>
        </div>
    </section>

    <!-- Timer & Stopwatch -->
    <section class="tool-card">
        <h3>⏱️ Timer & Stopwatch</h3>
        <div id="stopwatch-display" style="font-size: 2rem; margin-bottom: 10px;">00:00:00</div>
        <button onclick="startStopwatch()">Start</button>
        <button onclick="stopStopwatch()">Stop</button>
        <button onclick="resetStopwatch()">Reset</button>
    </section>
</main>

<script>
    // --- 1. TIME & LOCATION ---
    let userCity = "New York"; // Default
    
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        
        // Check Alarm
        checkAlarm(now);
    }
    setInterval(updateTime, 1000);

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('city-display').innerText = "Location Active";
                    // In a real app, use reverse geocoding here
                },
                () => {
                    const city = prompt("Location access denied. Please enter your city for time tracking:", "London");
                    userCity = city || "London";
                    document.getElementById('city-display').innerText = "City: " + userCity;
                }
            );
        }
    }
    window.onload = getLocation;

    // --- 2. WEATHER TOOL ---
    async function fetchWeather() {
        const city = document.getElementById('citySearch').value || userCity;
        const res = document.getElementById('weatherResult');
        res.innerHTML = "Fetching...";
        
        // NOTE: Replace 'YOUR_API_KEY' with a real OpenWeatherMap key
        try {
            // Mocking result for demonstration
            setTimeout(() => {
                res.innerHTML = `<strong>${city}</strong>: 24°C | Humidity: 60% <br> Sky: Clear`;
                document.getElementById('weather-top').innerText = `24°C, ${city}`;
            }, 800);
        } catch (e) {
            res.innerHTML = "Error fetching weather.";
        }
    }

    // --- 3. CALCULATOR LOGIC ---
    let calcScreen = document.getElementById('calc-display');
    function calcNum(n) { if(calcScreen.value === "0") calcScreen.value = n; else calcScreen.value += n; }
    function calcOp(op) { calcScreen.value += op; }
    function clearCalc() { calcScreen.value = "0"; }
    function calculate() {
        try { calcScreen.value = eval(calcScreen.value); }
        catch { calcScreen.value = "Error"; }
    }

    // --- 4. HILARIOUS ALARM SYSTEM ---
    let activeAlarm = null;

    function setAlarm() {
        const time = document.getElementById('alarmTime').value;
        const task = document.getElementById('taskInput').value;
        if(!time || !task) return alert("Enter time and task!");
        activeAlarm = { time, task };
        alert(`Routine set for ${time}: ${task}`);
    }

    function checkAlarm(now) {
        if (!activeAlarm) return;
        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        if (currentTime === activeAlarm.time) {
            shoutTask(activeAlarm.task);
            activeAlarm = null; // Reset
        }
    }

    function shoutTask(task) {
        const speech = new SpeechSynthesisUtterance();
        speech.text = `HEY! LISTEN! It is time to ${task}. Stop being lazy and do it now!`;
        speech.pitch = 2.0; // High hilarious pitch
        speech.rate = 1.2;
        window.speechSynthesis.speak(speech);
    }

    // --- 5. STOPWATCH ---
    let swInterval;
    let seconds = 0;
    function startStopwatch() {
        clearInterval(swInterval);
        swInterval = setInterval(() => {
            seconds++;
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            document.getElementById('stopwatch-display').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }
    function stopStopwatch() { clearInterval(swInterval); }
    function resetStopwatch() { 
        stopStopwatch(); 
        seconds = 0; 
        document.getElementById('stopwatch-display').innerText = "00:00:00"; 
    }
</script>

</body>
</html>
