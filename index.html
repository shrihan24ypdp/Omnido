<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarvKarta Command Center</title>
    <style>
        :root {
            --bg: #202124; --sidebar: #303134; --text: #bdc1c6;
            --accent: #8ab4f8; --hover: #3c4043; --border: #5f6368;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        nav h2 { color: var(--accent); font-size: 1.2rem; margin-bottom: 20px; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active { background: var(--hover); color: white; border-left: 4px solid var(--accent); }

        /* Main Content */
        main { flex: 1; display: flex; flex-direction: column; }
        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--sidebar); border-bottom: 1px solid var(--border); }
        
        .controls { display: flex; gap: 10px; }
        .btn { background: var(--hover); border: 1px solid var(--border); color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .content-area { flex: 1; padding: 30px; overflow-y: auto; display: flex; justify-content: center; }
        .tool-screen { width: 100%; max-width: 800px; display: none; }
        .tool-screen.active { display: block; }

        /* Google Calc Style */
        .calc-box { max-width: 350px; background: #202124; border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
        #calc-display { width: 100%; background: none; border: none; color: white; text-align: right; font-size: 2rem; margin-bottom: 20px; outline: none; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { padding: 15px; background: #3c4043; border: none; color: white; border-radius: 4px; font-size: 1.1rem; cursor: pointer; }
        .calc-btn:hover { background: #4f5357; }
        .calc-blue { background: var(--accent); color: #202124; }

        /* Input Styles */
        input { background: #202124; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<nav>
    <h2>SarvKarta 🛡️</h2>
    <div class="nav-item active" onclick="showTool('home')">🏠 Home</div>
    <div class="nav-item" onclick="showTool('weather')">🌦️ Weather</div>
    <div class="nav-item" onclick="showTool('calc')">🔢 Calculator</div>
    <div class="nav-item" onclick="showTool('games')">🎮 Games Hub</div>
    <div class="nav-item" onclick="showTool('alarm')">⏰ Alarm/Routine</div>
</nav>

<main>
    <header>
        <div class="controls">
            <button class="btn" onclick="showTool('home')">Home</button>
            <button class="btn" id="undoBtn" onclick="undo()" disabled>⟲ Undo</button>
            <button class="btn" id="redoBtn" onclick="redo()" disabled>⟳ Redo</button>
        </div>
        <div id="header-info" style="text-align: right;">
            <div id="top-clock" style="font-weight: bold;">00:00:00</div>
            <div id="top-loc" style="font-size: 0.8rem; color: var(--accent)">Detecting...</div>
        </div>
    </header>

    <div class="content-area">
        <!-- Home Screen -->
        <div id="home" class="tool-screen active">
            <h1>Welcome, Captain.</h1>
            <p>Select a tool from the sidebar to begin your session.</p>
        </div>

        <!-- Weather -->
        <div id="weather" class="tool-screen">
            <h3>Real-Time Weather</h3>
            <input type="text" id="citySearch" placeholder="Enter city...">
            <button class="btn" onclick="fetchWeather()">Search</button>
            <div id="weatherOut" style="margin-top:20px; font-size: 1.2rem;"></div>
        </div>

        <!-- Calculator -->
        <div id="calc" class="tool-screen">
            <div class="calc-box">
                <input type="text" id="calc-display" readonly value="0">
                <div class="calc-grid">
                    <button class="calc-btn" onclick="cIn('(')">(</button>
                    <button class="calc-btn" onclick="cIn(')')">)</button>
                    <button class="calc-btn" onclick="cIn('%')">%</button>
                    <button class="calc-btn" onclick="cClear()" style="background:#ea4335">AC</button>
                    <button class="calc-btn" onclick="cIn('7')">7</button>
                    <button class="calc-btn" onclick="cIn('8')">8</button>
                    <button class="calc-btn" onclick="cIn('9')">9</button>
                    <button class="calc-btn calc-blue" onclick="cIn('/')">÷</button>
                    <button class="calc-btn" onclick="cIn('4')">4</button>
                    <button class="calc-btn" onclick="cIn('5')">5</button>
                    <button class="calc-btn" onclick="cIn('6')">6</button>
                    <button class="calc-btn calc-blue" onclick="cIn('*')">×</button>
                    <button class="calc-btn" onclick="cIn('1')">1</button>
                    <button class="calc-btn" onclick="cIn('2')">2</button>
                    <button class="calc-btn" onclick="cIn('3')">3</button>
                    <button class="calc-btn calc-blue" onclick="cIn('-')">−</button>
                    <button class="calc-btn" onclick="cIn('0')">0</button>
                    <button class="calc-btn" onclick="cIn('.')">.</button>
                    <button class="calc-btn calc-blue" onclick="cSolve()" style="grid-column: span 2">=</button>
                </div>
            </div>
        </div>

        <!-- Games -->
        <div id="games" class="tool-screen">
            <h3>Games Hub</h3>
            <div class="calc-grid">
                <button class="calc-btn" onclick="alert('Chess...')">Chess</button>
                <button class="calc-btn" onclick="alert('Ludo...')">Ludo</button>
                <button class="calc-btn" onclick="alert('Snakes...')">Snakes</button>
                <button class="calc-btn" onclick="alert('TicTac...')">TicTac</button>
            </div>
        </div>

        <!-- Alarm -->
        <div id="alarm" class="tool-screen">
            <h3>Hilarious Routine Alarm</h3>
            <input type="text" id="alarmMsg" placeholder="Shout this task...">
            <input type="time" id="alarmTime">
            <button class="btn" onclick="setAlarm()">Set Alarm</button>
        </div>
    </div>
</main>

<script>
    // --- NAVIGATION & UNDO/REDO ---
    let history = ['home'];
    let redoStack = [];

    function showTool(id, isNavigating = true) {
        document.querySelectorAll('.tool-screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.innerText.toLowerCase().includes(id));
        });

        if (isNavigating && history[history.length-1] !== id) {
            history.push(id);
            redoStack = [];
        }
        updateHistoryButtons();
    }

    function undo() {
        if (history.length > 1) {
            redoStack.push(history.pop());
            showTool(history[history.length - 1], false);
        }
    }

    function redo() {
        if (redoStack.length > 0) {
            const next = redoStack.pop();
            history.push(next);
            showTool(next, false);
        }
    }

    function updateHistoryButtons() {
        document.getElementById('undoBtn').disabled = history.length <= 1;
        document.getElementById('redoBtn').disabled = redoStack.length === 0;
    }

    // --- CLOCK & ALARM ---
    let userAlarm = null;
    setInterval(() => {
        const now = new Date();
        document.getElementById('top-clock').innerText = now.toLocaleTimeString();
        if (userAlarm) {
            const cur = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if (cur === userAlarm.time) {
                const msg = new SpeechSynthesisUtterance("HEY! " + userAlarm.msg + ". DO IT NOW!");
                msg.pitch = 2.0;
                window.speechSynthesis.speak(msg);
                userAlarm = null;
            }
        }
    }, 1000);

    function setAlarm() {
        userAlarm = { msg: document.getElementById('alarmMsg').value, time: document.getElementById('alarmTime').value };
        alert("Routine Set!");
    }

    // --- WEATHER ---
    async function fetchWeather() {
        const city = document.getElementById('citySearch').value;
        const out = document.getElementById('weatherOut');
        out.innerText = "Scanning...";
        try {
            const res = await fetch(`https://weatherapi.com{city}`);
            const data = await res.json();
            out.innerHTML = `<b>${data.location.name}</b>: ${data.current.temp_c}°C<br>Condition: ${data.current.condition.text}`;
            document.getElementById('top-loc').innerText = `${data.current.temp_c}°C, ${data.location.name}`;
        } catch { out.innerText = "Error: Use a real city name."; }
    }

    // --- CALCULATOR ---
    const cDisp = document.getElementById('calc-display');
    function cIn(v) { if(cDisp.value === "0") cDisp.value = v; else cDisp.value += v; }
    function cClear() { cDisp.value = "0"; }
    function cSolve() { try { cDisp.value = eval(cDisp.value.replace('×', '*').replace('÷', '/')); } catch { cDisp.value = "Error"; } }
</script>
</body>
</html>
