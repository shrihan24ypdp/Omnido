<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SarvKarta - Calculator</title>
    <style>
        @import url('https://googleapis.com');
        @import url('https://fonts.cdnfonts.com/css/seven-segment');

        :root {
            --bg-color: darkturquoise;
            --header-bg: green;
            --text-color: white;
            --logo-fill: #222;
            --calc-bg: #2b2b2b;
            --calc-border: #d4af37;
            --display-bg: #000;
            --display-text: #00ff88;
            --btn-bg: #3d3d3d;
            --btn-text: #efefef;
            --border-color: #000;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --header-bg: #062a06;
            --text-color: #e0e0e0;
            --logo-fill: #ffffff;
            --calc-bg: #1a1a1a;
            --calc-border: #00ff88;
            --display-bg: #050505;
            --border-color: #444;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            font-family: 'Amita', cursive;
            transition: background-color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            border: solid 2px var(--border-color);
            border-radius: 8px;
            background-color: var(--header-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        #home-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 2rem;
            padding: 0 15px;
        }

        .peep-heading { display: flex; align-items: center; margin: 0; cursor: pointer; }
        .logo-text { fill: var(--logo-fill); transition: fill 0.4s; }

        /* Character Animations */
        .peep-heading:hover .character-head { transform: translateY(-5px); }
        .character-head { transition: transform 0.3s; transform-origin: center; }
        @keyframes eyeBlink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .eye-l { animation: eyeBlink 4s infinite; transform-origin: 55px 42px; }
        .eye-r { animation: eyeBlink 4s infinite; transform-origin: 75px 42px; }

        /* Calculator Styles */
        .calculator-container {
            background: var(--calc-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
            border: 2px solid var(--calc-border);
            width: 350px;
            transition: 0.3s;
        }

        .top-row { display: flex; gap: 12px; margin-bottom: 15px; }

        #display {
            flex-grow: 1;
            background: var(--display-bg);
            height: 70px;
            border-radius: 8px;
            font-size: 32px;
            text-align: right;
            padding: 0 15px;
            line-height: 70px;
            color: var(--display-text);
            font-family: 'Seven Segment', monospace;
            border: 1px solid #444;
            overflow: hidden;
        }

        .side-controls { display: flex; flex-direction: column; gap: 8px; }
        .side-btn {
            padding: 5px; font-size: 11px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 6px; color: white; width: 65px; height: 31px;
            font-family: 'Amita', cursive;
        }
        .clear-btn { background-color: #c0392b; }
        .del-btn { background-color: #d35400; }

        .calculator-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn { 
            padding: 15px; font-size: 22px; cursor: pointer; border: none; 
            border-radius: 12px; background-color: var(--btn-bg); color: var(--btn-text);
            font-family: 'Seven Segment', sans-serif;
            transition: 0.2s;
            box-shadow: 2px 2px 0px #000;
        }

        .calc-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .calc-btn:active { transform: translate(1px, 1px); box-shadow: 0px 0px; }

        .operations { background-color: #d4af37; color: #1a1a1a; font-weight: bold; }
        .advanced { background-color: #222; color: #00ff88; border: 1px solid #00ff88; font-size: 18px; }
        #equal { background: #00ff88; color: #1a1a1a; font-weight: bold; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px;
            background: var(--calc-border); border: 2px solid var(--border-color);
            width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle .moon { display: none; color: white; }
        [data-theme="dark"] .theme-toggle .sun { display: none; }
        [data-theme="dark"] .theme-toggle .moon { display: block; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <svg class="sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>
        <svg class="moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <header>
        <a id="home-link" href="index.html">𖠿</a>
        <div class="peep-heading">
            <svg viewBox="0 0 350 100" xmlns="http://w3.org" style="height: 60px; width: auto;">
                <text x="90" y="70" class="logo-text" font-family="Amita" font-size="50" font-weight="700">SarvKarta</text>
                <g transform="translate(5, 5) scale(0.7)">
                    <path d="M40 70c-15 0-20 10-20 25v45h90V95c0-15-5-25-20-25H40z" fill="#f9f9f9" stroke="black" stroke-width="3"/>
                    <g class="character-head">
                        <circle cx="65" cy="45" r="24" fill="#ffdbac" stroke="black" stroke-width="3"/>
                        <circle cx="65" cy="32" r="2.5" fill="red" />
                        <circle class="eye-l" cx="55" cy="42" r="2.5" fill="black" />
                        <circle class="eye-r" cx="75" cy="42" r="2.5" fill="black" />
                        <path d="M41 45 q0-20 24-20 t24 20" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
                    </g>
                </g>
            </svg>
        </div>
        <div style="width: 50px;"></div> <!-- Spacer to center logo -->
    </header>

    <div class="calculator-container">
        <div class="top-row">
            <div id="display">0</div>
            <div class="side-controls">
                <button class="side-btn clear-btn" onclick="clearDisplay()">CLEAR</button>
                <button class="side-btn del-btn" onclick="deleteLast()">DEL</button>
            </div>
        </div>
        
        <div class="calculator-grid">
            <button class="calc-btn advanced" onclick="startExponent()">^</button>
            <button class="calc-btn advanced" onclick="smartParentheses()">()</button> 
            <button class="calc-btn advanced" onclick="appendValue('%')">%</button>
            <button class="calc-btn advanced" onclick="calculateSqrt()">√</button>
            
            <button class="calc-btn" onclick="appendValue('7')">7</button>
            <button class="calc-btn" onclick="appendValue('8')">8</button>
            <button class="calc-btn" onclick="appendValue('9')">9</button>
            <button class="calc-btn operations" onclick="appendValue('/')">÷</button>
            
            <button class="calc-btn" onclick="appendValue('4')">4</button>
            <button class="calc-btn" onclick="appendValue('5')">5</button>
            <button class="calc-btn" onclick="appendValue('6')">6</button>
            <button class="calc-btn operations" onclick="appendValue('*')">×</button>
            
            <button class="calc-btn" onclick="appendValue('1')">1</button>
            <button class="calc-btn" onclick="appendValue('2')">2</button>
            <button class="calc-btn" onclick="appendValue('3')">3</button>
            <button class="calc-btn operations" onclick="appendValue('-')">-</button>
            
            <button class="calc-btn" onclick="appendValue('.')">.</button>
            <button class="calc-btn" onclick="appendValue('0')">0</button>
            <button class="calc-btn" id="equal" onclick="calculate()">=</button>
            <button class="calc-btn operations" onclick="appendValue('+')">+</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let isExponentMode = false;

        function toggleTheme() {
            const html = document.documentElement;
            html.getAttribute('data-theme') === 'dark' ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', 'dark');
        }

        function appendValue(val) {
            if (display.innerHTML === '0' || display.innerHTML === 'Error') {
                display.innerHTML = val;
            } else {
                if (isExponentMode && ['+', '-', '*', '/', '%'].includes(val)) isExponentMode = false;
                if (isExponentMode) {
                    let sups = display.getElementsByTagName('sup');
                    sups.length > 0 ? sups[sups.length - 1].innerHTML += val : display.innerHTML += `<sup>${val}</sup>`;
                } else {
                    display.innerHTML += val;
                }
            }
        }

        function startExponent() { if (display.innerHTML !== '0') isExponentMode = true; }

        function smartParentheses() {
            const content = display.innerHTML;
            const openCount = (content.match(/\(/g) || []).length;
            const closeCount = (content.match(/\)/g) || []).length;
            const lastChar = content.slice(-1);
            (openCount > closeCount && !isNaN(lastChar)) ? appendValue(')') : appendValue('(');
        }

        function clearDisplay() { display.innerHTML = '0'; isExponentMode = false; }

        function deleteLast() {
            if (display.innerHTML !== '0') {
                if (display.innerHTML.endsWith('</sup>')) {
                    let sups = display.getElementsByTagName('sup');
                    let lastSup = sups[sups.length - 1];
                    lastSup.innerHTML.length > 1 ? lastSup.innerHTML = lastSup.innerHTML.slice(0, -1) : (lastSup.remove(), isExponentMode = false);
                } else {
                    display.innerHTML = display.innerHTML.length > 1 ? display.innerHTML.slice(0, -1) : '0';
                }
            }
        }

        function calculate() {
            try {
                let expression = display.innerHTML.replace(/<sup>(.*?)<\/sup>/g, "**($1)").replace(/÷/g, '/').replace(/×/g, '*').replace(/%/g, '/100');
                let res = eval(expression);
                display.innerHTML = Number.isInteger(res) ? res : res.toFixed(4);
                isExponentMode = false;
            } catch { display.innerHTML = "Error"; }
        }

        function calculateSqrt() {
            try {
                let expression = display.innerHTML.replace(/<sup>(.*?)<\/sup>/g, "**($1)").replace(/%/g, '/100');
                display.innerHTML = Math.sqrt(eval(expression)).toFixed(4);
            } catch { display.innerHTML = "Error"; }
        }
    </script>
</body>
</html>
